    - generic [ref=e5]: "root@ubuntu_lab:/tmp# cat daemon_demo.c /* daemon_demo.c -- Linux守护进程编写实验 * 守护进程创建的标准步骤: * 1. fork() 创建子进程, 父进程退出 (子进程成为孤儿进程) * 2. setsid() 创建新会话, 脱离控制终端 * 3. 再次 fork() 防止进程重新获得终端 * 4. umask(0) 重置文件权限掩码 * 5. chdir(\"/\") 切换到根目录 * 6. 关闭继承的文件描述符 (0/1/2 -> /dev/null) * 7. 信号处理 (SIGHUP重载配置, SIGTERM优雅退出) * 8. 守护进程主循环 */ /* 信号处理: SIGTERM 优雅退出 */ void sigterm_handler(int sig) { syslog(LOG_INFO, \"收到 SIGTERM 信号, 守护进程退出\"); fprintf(log_fp, \"[%ld] 收到 SIGTERM, 退出\\n\", (long)time(NULL)); running = 0; } /* 信号处理: SIGHUP 重新加载配置 */ void sighup_handler(int sig) { syslog(LOG_INFO, \"收到 SIGHUP 信号, 重新加载配置\"); fprintf(log_fp, \"[%ld] 收到 SIGHUP, 重新加载配置\\n\", (long)time(NULL)); } /* 守护进程初始化 (标准8步骤) */ int daemon_init(const char *name) { /* 步骤1: fork(), 父进程退出 */ pid = fork(); if (pid > 0) exit(EXIT_SUCCESS); // 父进程退出 /* 步骤2: 创建新会话, 脱离终端 */ sid = setsid(); /* 步骤3: 再次 fork(), 防止重新获得终端 */ pid = fork(); if (pid > 0) exit(EXIT_SUCCESS); // 中间进程退出 /* 步骤4: 重置文件权限掩码 */ umask(0); /* 步骤5: 切换到根目录 */ chdir(\"/\"); /* 步骤6: 重定向 0/1/2 到 /dev/null */ int devnull = open(\"/dev/null\", O_RDWR); dup2(devnull, STDIN_FILENO); dup2(devnull, STDOUT_FILENO); dup2(devnull, STDERR_FILENO); /* 步骤7: 设置信号处理 */ sigaction(SIGTERM, &sa, NULL); sigaction(SIGHUP, &sa, NULL); /* 步骤8: 写入PID文件 + 启动syslog */ write_pidfile(PID_FILE); openlog(name, LOG_PID | LOG_CONS, LOG_DAEMON); } /* 工作循环: 每 WORK_INTERVAL 秒记录一次 */ void daemon_work(void) { syslog(LOG_INFO, \"工作循环 #%d\", ++work_count); fprintf(log_fp, \"[%ld] 循环 #%d\\n\", (long)time(NULL), work_count); }"
