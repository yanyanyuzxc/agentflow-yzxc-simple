    - generic [ref=e8]: "root@ubuntu_lab:/tmp# ./umask_demo ═══════════════════════════════════════ umask 对文件权限的影响演示 ═══════════════════════════════════════ [当前 umask] 0022 --- umask = 0022 (默认) --- 文件: /tmp/umask_default.txt 请求权限: 0666 → 实际权限: 0644 --- umask = 0000 (守护进程常用) --- 文件: /tmp/umask_zero.txt 请求权限: 0666 → 实际权限: 0666 --- umask = 0077 (最严格) --- 文件: /tmp/umask_strict.txt 请求权限: 0666 → 实际权限: 0600 --- 守护进程: umask(0) 创建各种权限的文件 --- 文件: /tmp/daemon_644.txt 请求权限: 0644 → 实际权限: 0644 文件: /tmp/daemon_600.txt 请求权限: 0600 → 实际权限: 0600 文件: /tmp/daemon_755.txt 请求权限: 0755 → 实际权限: 0755 ═══════════════════════════════════════ 总结: 新文件权限 = mode & ~umask 守护进程设置 umask(0) 确保文件权限完全由程序控制 ═══════════════════════════════════════"
